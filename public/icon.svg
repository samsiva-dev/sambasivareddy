<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="92" ry="92" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="8"/>
  <!-- Letter S (first) - bold monogram style -->
  <text x="148" y="355" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="300" fill="url(#accent)" letter-spacing="-20">S</text>
  <!-- Letter S (second) - overlapping with offset -->
  <text x="260" y="355" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="800" font-size="300" fill="#ffffff" fill-opacity="0.35" letter-spacing="-20">S</text>
  <!-- Decorative dot / accent -->
  <circle cx="420" cy="120" r="18" fill="#e2e8f0" opacity="0.9"/>
</svg>
